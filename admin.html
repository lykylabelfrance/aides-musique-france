<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Leads Aides Musique France</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#141428;border:1px solid #2a2a4a;border-radius:12px;padding:2rem;width:340px;text-align:center}
.login-box h2{color:#c8a2ff;margin-bottom:1rem}
.login-box input{width:100%;padding:.7rem;border-radius:8px;border:1px solid #3a3a5a;background:#1a1a2e;color:#fff;font-size:1rem;margin-bottom:1rem}
.login-box button{width:100%;padding:.7rem;border-radius:8px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:1rem;cursor:pointer;font-weight:600}
.admin-wrap{display:none;padding:1.5rem;max-width:1100px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem}
header h1{font-size:1.4rem;color:#c8a2ff}
header .badge{background:#7c3aed;color:#fff;padding:.3rem .8rem;border-radius:20px;font-size:.85rem}
#btnRefresh{padding:.5rem 1rem;border-radius:8px;border:1px solid #3a3a5a;background:#1a1a2e;color:#c8a2ff;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#141428;border:1px solid #2a2a4a;border-radius:10px;padding:1rem;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:700;color:#a855f7}
.stat-card .label{font-size:.8rem;color:#888;margin-top:.3rem}
table{width:100%;border-collapse:collapse;background:#141428;border-radius:10px;overflow:hidden}
thead{background:#1a1a2e}
th{padding:.8rem .6rem;text-align:left;color:#c8a2ff;font-size:.8rem;text-transform:uppercase}
td{padding:.7rem .6rem;border-top:1px solid #1a1a2e;font-size:.9rem}
tr:hover{background:#1a1a2e}
.tag{display:inline-block;padding:.2rem .6rem;border-radius:12px;font-size:.75rem;font-weight:600}
.tag-new{background:#1e3a5f;color:#60a5fa}
.tag-granted{background:#1a3a2a;color:#4ade80}
.tag-revoked{background:#3a1a1a;color:#f87171}
.btn-sm{padding:.3rem .7rem;border-radius:6px;border:none;font-size:.8rem;cursor:pointer;font-weight:600}
.btn-grant{background:#059669;color:#fff}
.btn-revoke{background:#dc2626;color:#fff}
.btn-sm:disabled{opacity:.5;cursor:not-allowed}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#141428;border:1px solid #7c3aed;color:#e0e0e0;padding:.8rem 1.2rem;border-radius:10px;display:none;z-index:999}
.empty{text-align:center;padding:2rem;color:#666}
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap"><div class="login-box"><h2>Admin Panel</h2><p style="color:#888;margin-bottom:1rem">Aides Musique France</p><input type="password" id="keyInput" placeholder="Cle admin..."><button id="btnLogin">Connexion</button><p id="loginErr" style="color:#f87171;margin-top:.8rem;display:none">Cle incorrecte</p></div></div>
<div class="admin-wrap" id="adminWrap">
<header><h1>Dashboard Leads</h1><div style="display:flex;gap:.5rem;align-items:center"><span class="badge" id="badgeCount">0</span><button id="btnRefresh">Rafraichir</button></div></header>
<div class="stats"><div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">Total</div></div><div class="stat-card"><div class="num" id="statNew">0</div><div class="label">Nouveaux</div></div><div class="stat-card"><div class="num" id="statGranted">0</div><div class="label">Accordes</div></div><div class="stat-card"><div class="num" id="statRevoked">0</div><div class="label">Revoques</div></div></div>
<table><thead><tr><th>Date</th><th>Prenom</th><th>Nom</th><th>Email</th><th>Aides</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="leadsBody"><tr><td colspan="7" class="empty">Chargement...</td></tr></tbody></table>
</div>
<div class="toast" id="toast"></div>
<script>
var E="https://script.google.com/macros/s/AKfycbx3ZR3JcukTQRxae7hBAnAIb9JczdxI9lUrwMyJphi9TZjKn4ElnFBVdlGuXpOx1U7udg/exec",K="";
function api(a,x){return fetch(E,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(Object.assign({action:a,key:K},x||{}))}).then(function(r){return r.json();});}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none"},3500);}
function stag(s){if(s==="Acces accorde")return'<span class="tag tag-granted">Acces accorde</span>';if(s==="Revoque")return'<span class="tag tag-revoked">Revoque</span>';return'<span class="tag tag-new">Nouveau</span>';}
function render(L){var b=document.getElementById("leadsBody");document.getElementById("statTotal").textContent=L.length;document.getElementById("badgeCount").textContent=L.length+" leads";var n=0,g=0,r=0;L.forEach(function(l){if(l.statut==="Acces accorde")g++;else if(l.statut==="Revoque")r++;else n++;});document.getElementById("statNew").textContent=n;document.getElementById("statGranted").textContent=g;document.getElementById("statRevoked").textContent=r;if(!L.length){b.innerHTML='<tr><td colspan="7" class="empty">Aucun lead</td></tr>';return;}var h="";L.forEach(function(l){h+="<tr><td>"+(l.date||"-")+"</td><td>"+(l.prenom||"-")+"</td><td>"+(l.nom||"-")+"</td><td>"+(l.email||"-")+"</td><td>"+(l.nbAides||0)+"</td><td>"+stag(l.statut)+"</td><td><button class='btn-sm btn-grant' onclick='grant("+l.row+")'"+(l.statut!=="Acces accorde"?"":" disabled")+">Accorder</button> <button class='btn-sm btn-revoke' onclick='revoke("+l.row+")'"+(l.statut==="Acces accorde"?"":" disabled")+">Revoquer</button></td></tr>";});b.innerHTML=h;}
function load(){document.getElementById("leadsBody").innerHTML='<tr><td colspan="7" class="empty">Chargement...</td></tr>';api("get_leads").then(function(d){if(d.status==="success")render(d.leads||[]);}).catch(function(){});}
function grant(r){if(!confirm("Accorder acces ?"))return;api("grant_access",{row:r}).then(function(d){toast(d.success?"Acces accorde ! Email envoye.":"Erreur");load();});}
function revoke(r){if(!confirm("Revoquer acces ?"))return;api("revoke_access",{row:r}).then(function(d){toast(d.success?"Revoque.":"Erreur");load();});}
document.getElementById("btnLogin").onclick=function(){var k=document.getElementById("keyInput").value.trim();if(!k)return;K=k;api("get_leads").then(function(d){if(d.status==="success"){document.getElementById("loginWrap").style.display="none";document.getElementById("adminWrap").style.display="block";render(d.leads||[]);}else{document.getElementById("loginErr").style.display="block";K="";}}).catch(function(){document.getElementById("loginErr").style.display="block";K="";});};
document.getElementById("keyInput").onkeydown=function(e){if(e.key==="Enter")document.getElementById("btnLogin").click();};
document.getElementById("btnRefresh").onclick=load;
</script>
</body>
</html>
